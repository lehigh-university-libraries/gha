name: build-push-ghcr
on:
  workflow_call:
    inputs:
      image:
        required: false
        type: string
        default: ""
      context:
        required: false
        type: string
        default: "."
      runners:
        required: false
        type: string
        default: '["ubuntu-24.04", "ubuntu-24.04-arm"]'
      gar_image:
        required: false
        type: string
        default: ""
      file:
        required: false
        type: string
        default: ""
      build_args:
        required: false
        type: string
        default: ""
jobs:
  build:
    strategy:
      matrix:
        runner: ${{ fromJSON(inputs.runners) }}
    name: build-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    outputs:
      image-tag: ${{ steps.record-tag.outputs.tag }}
    steps:
      - name: validate input
        run: |
          regex='^([A-Za-z0-9\.\/\-]+)?$'
          if [[ "${{ inputs.image }}" =~ $regex ]]; then
            echo "Valid docker image name"
          else
            echo "Invalid docker image name"
            exit 1
          fi
          if [[ "${{ inputs.context }}" =~ $regex ]]; then
            echo "Valid docker context"
          else
            echo "Invalid docker context"
            exit 1
          fi
          if [[ "${{ inputs.gar_image }}" =~ $regex ]]; then
            echo "Valid GAR image name"
          else
            echo "Invalid GAR image name"
            exit 1
          fi
          if [[ "${{ inputs.file }}" =~ $regex ]]; then
            echo "Valid Dockerfile path"
          else
            echo "Invalid Dockerfile path"
            exit 1
          fi

      - name: ghcr Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lehigh-university-libraries/gha
          path: gha
          sparse-checkout: |
            ci/gha-extract-docker-vars.sh
          sparse-checkout-cone-mode: false
      - run: ./gha/ci/gha-extract-docker-vars.sh
        id: vars
        env:
          DOCKER_IMAGE: ghcr.io/lehigh-university-libraries/${{ inputs.image }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: build+push GHCR
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          build-args: |
            TARGETARCH=${{ steps.vars.outputs.platform }}
            LEHIGH_TAG=${{ steps.vars.outputs.tag }}
            ${{ inputs.build_args }}
          push: true
          cache-from: ${{ steps.vars.outputs.cache-from }}
          cache-to: ${{ steps.vars.outputs.cache-to }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform }}
      - name: record image tag
        id: record-tag
        run: |
          echo "tag=${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform }}" >> $GITHUB_OUTPUT
  merge:
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - name: ghcr Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Cloud SDK
        if: inputs.gar_image != ''
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          version: "latest"

      - name: Authenticate to Google Cloud
        if: inputs.gar_image != ''
        id: "auth"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCLOUD_OIDC_POOL }}
          service_account: ${{ secrets.GSA }}
          token_format: "access_token"

      - name: Configure gcloud
        if: inputs.gar_image != ''
        run: |
          gcloud config set project ${{ secrets.GCLOUD_PROJECT }}
          gcloud config set disable_prompts true

      - name: GAR login
        if: inputs.gar_image != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: "us-docker.pkg.dev"
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lehigh-university-libraries/gha
          path: gha
          sparse-checkout: |
            ci/gha-extract-docker-vars.sh
          sparse-checkout-cone-mode: false

      - run: ./gha/ci/gha-extract-docker-vars.sh
        id: vars
        env:
          DOCKER_IMAGE: ghcr.io/lehigh-university-libraries/${{ inputs.image }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: merge platform images
        run: |
          tags=""
          mapfile -t runners < <(echo '${{ inputs.runners }}' | jq -r '.[]')
          for runner in "${runners[@]}"; do
            RUNNER_ARCH="X64"
            if [[ "$runner" == *"arm"* ]]; then
              RUNNER_ARCH="ARM64"
            fi
            GITHUB_OUTPUT=/tmp/vars_${runner}.txt ./gha/ci/gha-extract-docker-vars.sh
            image=$(grep "^image=" /tmp/vars_${runner}.txt | cut -d'=' -f2)
            tag=$(grep "^tag=" /tmp/vars_${runner}.txt | cut -d'=' -f2)
            platform=$(grep "^platform=" /tmp/vars_${runner}.txt | cut -d'=' -f2)

            tags="$tags ${image}:${tag}-${platform}"
          done

          extra_tags=""
          if [[ -n "${{ inputs.gar_image }}" ]]; then
            extra_tags="-t ${{ inputs.gar_image }}:${{ steps.vars.outputs.tag }}"
          fi

          docker buildx imagetools create \
            -t "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}" \
            $extra_tags \
            $tags
        env:
          DOCKER_IMAGE: ${{ steps.vars.outputs.image }}
